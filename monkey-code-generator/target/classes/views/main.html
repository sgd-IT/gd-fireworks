<div class="panel panel-default">
    <div class="panel-heading">基本信息</div>
    <div style="padding: 10px 0 20px 10px;">
        <h3>&nbsp;&nbsp;&nbsp;详细说明</h3>
        <ul>
            <li>1、可在线生成：controller、entity、service、mapper、vue、sql 代码</li>
            <li>2、生成代码前修改：application.yml 中的数据库连接字符串</li>
            <li>3、生成代码前修改：generator.properties 中的配置信息</li>
            <li>4、resources 目录下的 template 目录里面的文件是代码生成器的模板</li>
            <li>5、核心生成代码在：com.monkey.utils.GenUtils 工具类中</li>
        </ul>
    </div>
</div>
